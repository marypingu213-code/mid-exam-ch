<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>六年級國語期中挑戰賽 🏆</title>
    <style>
        :root {
            --primary: #FFB7C5;
            --secondary: #98D8D8;
            --bg: #FFF9E3;
            --text: #5A5A5A;
        }

        * { box-sizing: border-box; -webkit-user-select: none; touch-action: manipulation; }

        body {
            margin: 0; padding: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #app {
            width: 95%; height: 95%;
            max-width: 850px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex; flex-direction: column;
            position: relative;
        }

        .header { text-align: center; font-size: 1.5rem; margin-bottom: 10px; color: #FF80AB; font-weight: bold; }

        /* 隱藏區塊 */
        #quiz-container, #word-container, #result-screen, #mode-selection { 
            flex: 1; display: none; flex-direction: column; 
        }

        .active { display: flex !important; }

        /* 朗讀按鈕 (預設隱藏，語音版才會顯示) */
        .read-btn {
            background: #E3F2FD;
            border: none;
            border-radius: 50%;
            width: 38px; height: 38px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 12px;
            display: none; /* 預設不顯示 */
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 語音模式啟動時顯示喇叭 */
        .audio-mode .read-btn { display: inline-flex; }

        /* 題目與選項佈局 */
        .question-box {
            display: flex; align-items: center;
            font-size: 1.25rem; margin-bottom: 20px;
            line-height: 1.5; padding: 15px;
            background: #F0F4FF; border-radius: 15px;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-row { display: flex; align-items: center; }

        .answer-btn {
            flex: 1; padding: 15px;
            font-size: 1.1rem; border: 2px solid #EEE;
            border-radius: 15px; background: white;
            text-align: left; transition: 0.2s;
        }
        .answer-btn:active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 語詞辨識 */
        .word-card {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; padding: 12px;
            border-bottom: 2px dashed #FFD1DC;
        }
        .word-btn { 
            font-size: 1.5rem; width: 130px; margin: 0 8px; 
            border: 2px solid #EEE; border-radius: 12px; background: white; padding: 10px;
        }
        .correct { background-color: #C8E6C9 !important; border-color: #4CAF50 !important; }
        .wrong { background-color: #FFCDD2 !important; border-color: #F44336 !important; }

        /* 模式選擇按鈕 */
        .mode-btn {
            padding: 25px; margin: 15px; font-size: 1.4rem;
            border-radius: 20px; border: none; cursor: pointer;
            transition: transform 0.2s; color: white;
        }
        .mode-btn:active { transform: scale(0.95); }
        .btn-normal { background-color: #B2DFDB; color: #00796B; }
        .btn-audio { background-color: #FFCDD2; color: #C2185B; }

        .progress-bar { height: 8px; background: #EEE; border-radius: 4px; margin-bottom: 10px; }
        #progress-fill { height: 100%; width: 0%; background: var(--secondary); border-radius: 4px; transition: width 0.3s; }
        .done { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body>

<div id="app">
    <div id="mode-selection" class="active" style="text-align: center; justify-content: center;">
        <h1 style="color: #FF80AB;">🌟 請選擇測驗模式 🌟</h1>
        <p>點選適合你的方式開始挑戰！</p>
        <button class="mode-btn btn-normal" onclick="initApp(false)">📖 一般挑戰版<br><small>(自己閱讀題目)</small></button>
        <button class="mode-btn btn-audio" onclick="initApp(true)">🔊 語音助讀版<br><small>(可點擊圖示聽題目)</small></button>
    </div>

    <div id="quiz-container">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="header" id="quiz-header">📝 文意選擇題</div>
        <div id="q-box" class="question-box"></div>
        <div id="q-options" class="options-grid"></div>
    </div>

    <div id="word-container">
        <div class="header">🎧 語詞辨識 (選出正確字詞)</div>
        <p id="word-hint" style="text-align: center; color: #888;"></p>
        <div id="word-list" style="overflow-y: auto; flex: 1;"></div>
        <button id="next-to-result" style="display:none; margin-top:10px; background:var(--secondary); color:white; padding:15px; border:none; border-radius:15px; font-size:1.2rem;" onclick="showFinalResult()">結算分數 🏁</button>
    </div>

    <div id="result-screen" style="text-align: center; justify-content: center;">
        <h1 id="score-display" style="font-size: 3rem;">🎉</h1>
        <p style="font-size: 1.2rem;">挑戰完成！你是最棒的！</p>
        <button onclick="location.reload()" style="padding:12px 30px; border-radius:15px; border:2px solid #ccc; background: white; font-size:1rem;">重新挑戰 🔄</button>
    </div>
</div>

<script>
    let isAudioMode = false;
    let currentQ = 0;
    let score = 0;

    const questions = [
        { q: "在〈風中騎士〉一文中，作者剛開始練習騎單車時，為什麼感到手心冒汗、呼吸急促？", a: ["因為她擔心會撞到正在尿尿的阿雄", "因為單車的高度比作者本人還要高", "因為表姐教練的態度非常嚴厲", "因為路上的觀眾太多，讓她感到害羞"], c: 1 },
        { q: "〈風中騎士〉的結局中，作者摔車並造成阿雄受傷的主要技術原因是？", a: ["教練完全沒有教導如何煞車", "單車的鏈條突然斷裂失去控制", "作者為了展現放開雙手的特技", "作者分心去回應雜貨店阿秀的招手"], c: 0 },
        { q: "在〈達駭黑熊〉中，爺爺為何在年輕時殺掉黑熊後，有一段時間不敢上山打獵？", a: ["因為他擔心會再次遇到黑熊的報復", "因為布農族傳統忌殺黑熊，內心充滿懊悔", "因為他在搏鬥中受了重傷無法行動", "因為他失去了最好的獵犬與裝備"], c: 1 },
        { q: "根據〈達駭黑熊〉的描述，下列何者屬於爺爺所傳授的「山林智慧」？", a: ["如何利用太陽的影子來判斷精確經緯度", "學習如何使用無人機進行空拍巡視", "從地上的糞便辨識動物的種類", "教導如何製作精巧的獵熊陷阱"], c: 2 },
        { q: "在〈夢想與楷模〉一文中，齊柏林先生克服了什麼生理恐懼來完成《看見臺灣》？", a: ["懼高症", "嚴重的暈機反應", "幽閉恐懼症", "色盲"], c: 0 },
        { q: "籃球球員科懷．雷納德 除了學習喬丹的動作，更學習他的哪種精神？", a: ["兩千次投籃練習的勤奮精神", "追求高薪合約的商業頭腦", "在場上對裁判抗議的強硬態度", "與隊友合作的領導能力"], c: 0 },
        { q: "華特．迪士尼的故事告訴我們，當原有的夢想「此路不通」時應該如何面對？", a: ["對辭退他的公司提出法律訴訟", "放棄繪畫，轉向完全不相關的商業領域", "選擇另一個岔口向前，可能看見未預料的美景", "堅持原有的目標直到對方認可為止"], c: 2 },
        { q: "在〈蒂烈娜〉中，蒂烈娜最初為什麼認為自己是族群裡的「失敗者」？", a: ["因為她被族群中的長輩驅逐", "因為她找不到回家的路", "因為只有她無法躍過激流", "因為她的銀白色鱗片不夠閃亮"], c: 2 },
        { q: "蒂烈娜在夢境（或幻象）中學到了什麼，讓她最後能成功躍過激流？", a: ["星星們給了她一雙隱形的翅膀", "學會了如何在水中長時間閉氣", "她發現了激流下方的祕密通道", "展現出不畏疼痛、奮力一躍的決心"], c: 3 },
        { q: "綜合這幾篇文本，關於「克服困難」與「夢想」的描述，下列敘述何者正確？", a: ["夢想一旦設定，就不可以有任何變動或調整", "只要有教練，就絕對不會遭遇任何危險", "只有天賦異稟的人才有可能實現遠大的目標", "失敗是過程的一部分，重新站起來是前行的方式"], c: 3 }
    ];

    const words = [
        { correct: "長褲", wrong: "長庫" }, { correct: "提供", wrong: "提拱" },
        { correct: "黑熊", wrong: "黑能" }, { correct: "骸骨", wrong: "駭骨" },
        { correct: "領域", wrong: "領或" }, { correct: "強勁", wrong: "強經" },
        { correct: "敏捷", wrong: "敏睫" }, { correct: "楷模", wrong: "楷摸" },
        { correct: "凶猛", wrong: "凶孟" }, { correct: "竅門", wrong: "竅們" }
    ];

    function speak(text) {
        if (!isAudioMode) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function initApp(audioMode) {
        isAudioMode = audioMode;
        if (isAudioMode) document.body.classList.add('audio-mode');
        document.getElementById('mode-selection').classList.remove('active');
        document.getElementById('quiz-container').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        if (currentQ >= questions.length) {
            startWordTest();
            return;
        }
        const q = questions[currentQ];
        const qBox = document.getElementById('q-box');
        qBox.innerHTML = `
            <button class="read-btn" onclick="speak('${q.q}')">🔊</button>
            <span>${currentQ + 1}. ${q.q}</span>
        `;

        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        q.a.forEach((opt, idx) => {
            const row = document.createElement('div');
            row.className = 'opt-row';
            row.innerHTML = `
                <button class="read-btn" onclick="speak('${opt}')">🔊</button>
                <button class="answer-btn" onclick="checkAnswer(${idx})">${String.fromCharCode(65 + idx)}. ${opt}</button>
            `;
            optionsDiv.appendChild(row);
        });
        document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;
    }

    function checkAnswer(idx) {
        if (idx === questions[currentQ].c) score++;
        currentQ++;
        showQuestion();
    }

    function startWordTest() {
        document.getElementById('quiz-container').classList.remove('active');
        document.getElementById('word-container').classList.add('active');
        document.getElementById('word-hint').innerText = isAudioMode ? "點擊喇叭聽聽看，哪一個字才是正確的？" : "請從兩個相似字中選出正確的字詞。";
        
        const list = document.getElementById('word-list');
        words.forEach((pair) => {
            const div = document.createElement('div');
            div.className = 'word-card';
            const isCorrectLeft = Math.random() > 0.5;
            const leftWord = isCorrectLeft ? pair.correct : pair.wrong;
            const rightWord = isCorrectLeft ? pair.wrong : pair.correct;

            div.innerHTML = `
                <button class="read-btn" onclick="speak('${pair.correct}')">🔊</button>
                <button class="word-btn" onclick="checkWord(this, '${leftWord}', '${pair.correct}')">${leftWord}</button>
                <button class="word-btn" onclick="checkWord(this, '${rightWord}', '${pair.correct}')">${rightWord}</button>
            `;
            list.appendChild(div);
        });
    }

    let wordsChecked = 0;
    function checkWord(btn, selected, correct) {
        const parent = btn.parentElement;
        if (parent.classList.contains('done')) return;
        if (selected === correct) { btn.classList.add('correct'); score++; } 
        else { btn.classList.add('wrong'); }
        parent.classList.add('done');
        wordsChecked++;
        if (wordsChecked === words.length) document.getElementById('next-to-result').style.display = 'block';
    }

    function showFinalResult() {
        document.getElementById('word-container').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('score-display').innerText = `🏆 總分：${score} / 20`;
    }
</script>
</body>
</html>
