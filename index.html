<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>六年級國語期中挑戰賽 🏆</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #FFB7C5; --secondary: #98D8D8; --bg: #FFF9E3;
            --text: #5A5A5A; --accent: #FF80AB;
        }
        * { box-sizing: border-box; -webkit-user-select: none; touch-action: manipulation; }
        body {
            margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg); color: var(--text);
            height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        #app {
            width: 95%; height: 95%; max-width: 950px; background: white; border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; display: flex; flex-direction: column; position: relative;
        }
        #quiz-container, #word-container, #result-screen, #mode-selection, #mcq-summary, #level-selection { 
            flex: 1; display: none; flex-direction: column; 
        }
        .active { display: flex !important; }
        .countdown-box {
            background: #FFF0F5; padding: 12px; border-radius: 15px; margin: 10px 0;
            border: 2px dashed var(--primary); text-align: center;
        }
        #timer { color: #E91E63; font-weight: bold; font-size: 1.4rem; }
        .read-btn {
            background: #E3F2FD; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 1.5rem;
            cursor: pointer; margin-right: 15px; display: none; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .audio-mode .read-btn { display: inline-flex; }
        .question-box {
            display: flex; align-items: flex-start; font-size: 1.4rem; margin-bottom: 20px;
            padding: 15px; background: #F0F4FF; border-radius: 15px;
        }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .answer-btn {
            display: flex; align-items: center; padding: 12px; font-size: 1.2rem; 
            border: 2px solid #EEE; border-radius: 15px; background: white; text-align: left; transition: 0.3s;
        }
        .answer-btn:active { background: var(--primary); color: white; }
        .word-btn-big {
            font-size: 6rem; padding: 30px 50px; border-radius: 30px; border: 5px solid #EEE;
            background: white; cursor: pointer; min-width: 300px; text-align: center;
        }
        .correct { background-color: #C8E6C9 !important; border-color: #4CAF50 !important; color: #2E7D32 !important; }
        .wrong { background-color: #FFCDD2 !important; border-color: #F44336 !important; color: #C62828 !important; }
        .summary-list {
            text-align: left; background: #f9f9f9; padding: 15px; border-radius: 15px;
            overflow-y: auto; max-height: 280px; margin: 10px 0;
        }
        .error-item { color: #D32F2F; margin-bottom: 10px; font-size: 0.95rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .mode-btn { padding: 15px; margin: 5px; font-size: 1.3rem; border-radius: 20px; border: none; color: white; cursor: pointer; min-width: 200px; }
        .btn-blue { background-color: #4FC3F7; } .btn-purple { background-color: #BA68C8; } .btn-green { background-color: #81C784; }
        .btn-normal { background-color: #B2DFDB; color: #00796B; } .btn-audio { background-color: #FFCDD2; color: #C2185B; }
        .progress-bar { height: 8px; background: #EEE; border-radius: 4px; margin-bottom: 10px; }
        #progress-fill { height: 100%; width: 0%; background: var(--secondary); border-radius: 4px; transition: width 0.3s; }
        #qr-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 5px solid var(--secondary); padding: 20px; border-radius: 20px; z-index: 100; text-align: center; }
        #strict-hint { color: #F44336; font-weight: bold; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="mode-selection" class="active" style="text-align: center; justify-content: center;">
        <h1 style="color: var(--accent); margin: 0;">🎓 畢業倒數挑戰賽</h1>
        <div class="countdown-box">距離 6/15 畢業典禮還有：<br><span id="timer">計算中...</span></div>
        <p>請選擇測驗關卡：</p>
        <button class="mode-btn btn-blue" onclick="selectLevel(10, false)">基礎 10 題版</button>
        <button class="mode-btn btn-purple" onclick="selectLevel(20, true)">進階 20 題 (精熟版)</button>
        <button class="mode-btn btn-green" onclick="selectLevel(30, false)">魔王 30 題版</button>
        <div style="margin-top: 15px;"><button onclick="toggleQR()" style="background:none; border:1px solid #ddd; padding:5px 10px; border-radius:8px; cursor:pointer;">📱 顯示分享碼</button></div>
    </div>

    <div id="level-selection" style="text-align: center; justify-content: center;">
        <h2 id="selected-level-title">正在準備...</h2>
        <button class="mode-btn btn-normal" onclick="initQuiz(false)">📖 一般挑戰版</button>
        <button class="mode-btn btn-audio" onclick="initQuiz(true)">🔊 語音助讀版</button>
        <button onclick="goToLobby()" style="margin-top:20px; background:none; border:none; text-decoration:underline; cursor:pointer;">返回</button>
    </div>

    <div id="quiz-container">
        <div id="strict-hint">❌ 答錯了，請再仔細讀一遍，重新選擇！</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="q-box" class="question-box"></div>
        <div id="q-options" class="options-grid"></div>
    </div>

    <div id="mcq-summary" style="text-align: center; justify-content: center;">
        <h2 id="summary-title" style="color: var(--accent);">測驗完成！</h2>
        <div style="font-size: 1.5rem;">答對 <span id="mcq-correct-count" style="color:green; font-weight:bold;">0</span> 題 / 共 <span id="mcq-total-count">0</span> 題</div>
        <div id="mcq-error-list" class="summary-list"></div>
        <button class="mode-btn btn-blue" onclick="startWordTest()">下一步：超大字語詞辨識 👉</button>
    </div>

    <div id="word-container">
        <div class="progress-bar"><div id="word-progress-fill" style="height:100%; width:0%; background:var(--primary); border-radius:4px;"></div></div>
        <div class="word-display-area"><div id="word-audio-box"></div><div id="word-pair-container" style="display:flex; gap:40px; margin:40px 0;"></div><p style="font-size:1.5rem; color:#999;">選出正確的字詞</p></div>
    </div>

    <div id="result-screen" style="text-align: center; justify-content: center;">
        <h1 style="font-size: 5rem; margin: 0;">🏆</h1>
        <h2>恭喜通關！</h2>
        <div style="font-size: 2rem; margin-bottom: 30px;">得分：<span id="final-total-score">0</span></div>
        <button class="mode-btn btn-blue" style="padding:15px 60px;" onclick="goToLobby()">回到大廳 🏠</button>
    </div>

    <div id="qr-modal"><h3>掃描進入</h3><div id="qrcode" style="display:flex; justify-content:center; margin:15px;"></div><button onclick="toggleQR()">關閉</button></div>
</div>

<script>
    let isAudioMode = false; let currentQ = 0; let mcqCorrect = 0; let currentW = 0; let wordCorrect = 0;
    let mcqResults = []; let selectedTotal = 10; let isStrictLevel = false;

    const questions10 = [
        { q: "在〈風中騎士〉一文中，作者剛開始練習騎單車時，為什麼感到手心冒汗、呼吸急促？", a: ["因為她擔心會撞到正在尿尿的阿雄", "因為單車的高度比作者本人還要高", "因為表姐教練的態度非常嚴厲", "因為路上的觀眾太多，讓她感到害羞"], c: 1 },
        { q: "〈風中騎士〉的結局中，作者摔車並造成阿雄受傷的主要技術原因是？", a: ["教練完全沒有教導如何煞車", "單車的鏈條突然斷裂失去控制", "作者為了展現放開雙手的特技", "作者分心去回應雜貨店阿秀的招手"], c: 0 },
        { q: "在〈達駭黑熊〉中，爺爺為何在年輕時殺掉黑熊後，有一段時間不敢上山打獵？", a: ["因為他擔心會再次遇到黑熊的報復", "因為布農族傳統忌殺黑熊，內心充滿懊悔", "因為他在搏鬥中受了重傷無法行動", "因為他失去了最好的獵犬與裝備"], c: 1 },
        { q: "根據〈達駭黑熊〉的描述，下列何者屬於爺爺所傳授的「山林智慧」？", a: ["如何利用太陽的影子來判斷精確經緯度", "學習如何使用無人機進行空拍巡視", "從地上的糞便判斷動物的種類", "教導如何製作精巧的獵熊陷阱"], c: 2 },
        { q: "在〈夢想與楷模〉一文中，齊柏林先生克服了什麼生理恐懼來完成《看見臺灣》？", a: ["懼高症", "嚴重的暈機反應", "幽閉恐懼症", "色盲"], c: 0 },
        { q: "籃球球員科懷．雷納德 除了學習喬丹的動作，更學習他的哪種精神？", a: ["兩千次投籃練習的勤奮精神", "追求高薪合約的商業頭腦", "在場上對裁判抗議的強硬態度", "與隊友合作的領導能力"], c: 0 },
        { q: "華特．迪士尼的故事告訴我們，當原有的夢想「此路不通」時應該如何面對？", a: ["對辭退他的公司提出法律訴訟", "放棄繪畫，轉向完全不相關的商業領域", "選擇另一個岔口向前，可能看見未預料的美景", "堅持原有的目標直到對方認可為止"], c: 2 },
        { q: "在〈蒂烈娜〉中，蒂烈娜最初為什麼認為自己是族群裡的「失敗者」？", a: ["因為她被族群中的長輩驅逐", "因為她找不到回家的路", "因為只有她無法躍過激流", "因為她的銀白色鱗片不夠閃亮"], c: 2 },
        { q: "蒂烈娜在夢境（或幻象）中學到了什麼，讓她最後能成功躍過激流？", a: ["星星們給了她一雙隱形的翅膀", "學會了如何在水中長時間閉氣", "她發現了激流下方的祕密通道", "展現出不畏疼痛、奮力一躍的決心"], c: 3 },
        { q: "綜合這幾篇文本，關於「克服困難」與「夢想」的描述，下列敘述何者正確？", a: ["夢想一旦設定，就不可以有任何變動或調整", "只要有教練，就絕對不會遭遇任何危險", "只有天賦異稟的人才有可能實現遠大的目標", "失敗是過程的一部分，重新站起來是前行的方式"], c: 3 }
    ];

    const questions20 = [
        { q: "在《風中騎士》中,作者在練車前穿上兩件特厚長褲的原因是什麼?", a: ["為了讓自己看起來更有騎士的威嚴", "因為鄉下的清晨氣溫非常寒冷", "為了在摔跤時能減輕疼痛感", "因為那是表姐規定的練車服裝"], c: 2 },
        { q: "〈風中騎士》的作者最後為什麼會撞上阿雄?", a: ["因為作者當時在向雜貨店的阿秀招手", "因為阿雄突然衝到路中央擋住去路", "因為單車的煞車零件突然壞掉了", "因為表姐沒有教導如何使用煞車"], c: 3 },
        { q: "在《達駭黑熊》中,爺爺將「山林」比喻成一本書,這代表什麼含意?", a: ["山林裡的各種痕跡都包含了豐富的知識", "爺爺在山裡收藏了許多珍貴的書籍", "爺爺讀過許多關於自然科學的專業著作", "爺爺希望孫子能把打獵的故事寫成書"], c: 0 },
        { q: "關於爺爺獵殺黑熊後的處理方式,下列敘述何者正確?", a: ["他將黑熊的骸骨埋入土中回歸自然", "他將熊皮做成大衣送給孫子達駭", "他直接將黑熊棄置在山林中不予理會", "他將黑熊帶回部落與大家分享食物"], c: 0 },
        { q: "在《達駭黑熊》故事結尾,奶奶為什麼說「這是最棒的收穫」?", a: ["因為達駭終於學會了如何獨自打獵", "因為他們救了小黑熊並讓牠與母親團聚", "因為爺爺和達駭獵到了許多大型動物", "因為他們在山林裡找到了珍貴的草藥"], c: 1 },
        { q: "齊柏林先生是如何克服自己的弱點來達成目標的?", a: ["他聘請了攝影師代替他上天拍照", "他選擇在地面使用長焦鏡頭拍攝", "他透過服用藥物來治療懼高症", "他憑藉著對土地的熱愛,忍受懼高不斷飛行"], c: 3 },
        { q: "超馬選手陳彥博的逐夢過程給我們什麼樣的啟示?", a: ["不斷挑戰自我極限,在不同階段設立新目標", "只要有天分,不需要練習也能成功", "應該專注單一領域,不要更換目標", "出國比賽比在國內比賽更容易獲得成就感"], c: 0 },
        { q: "雷納德學習「籃球之神」喬丹的哪一部分最令他成功?", a: ["學習喬丹在媒體面前的說話技巧", "學習喬丹購買昂貴籃球裝備的習慣", "學習喬丹動作技巧與勤奮苦練的精神", "學習喬丹在比賽後提早離開休息"], c: 2 },
        { q: "華特·迪士尼創作出米老鼠的契機是什麼?", a: ["他天生就是動畫大師", "他在廣告公司獲得了老闆的賞識", "他在新公司接觸到動畫製作產生的創意", "他在失業期間觀察家中跑出的小老鼠"], c: 2 },
        { q: "主角蒂烈娜最初為什麼認為自己是族群裡的失敗者?", a: ["因為她的體色跟其他鯛魚長得不一樣", "因為她不聽從族長巴掌大星星的指揮", "因為她不小心流落到銀河裡回不去", "因為她無法像同伴一樣成功越過激流"], c: 3 },
        { q: "在《蒂烈娜》中,「銀河衝浪手」對蒂烈娜產生了什麼影響?", a: ["教導她如何利用翅膀在空中飛行", "透過共同挑戰星浪,重建信心與決心", "給了她神奇披風,獲得超能力", "讓她明白失敗是正常的,不需要再努力"], c: 1 },
        { q: "蒂烈娜醒來後,如何面對七家灣溪的急流?", a: ["她沿著溪水往下游游去", "她咬緊牙關,帶著不再放棄的決心全力衝刺", "她發現無法克服,只好選擇離開", "她等待同伴下來幫她推上激流"], c: 1 },
        { q: "《達駭黑熊》中,爺爺吟唱「熊歌」的目的最可能是什麼?", a: ["慶祝打獵終於有了一點點收穫", "為了嚇跑附近危險野獸", "這是布農族黎明時必須進行的儀式", "為了通知黑熊媽媽,牠的孩子在這裡"], c: 3 },
        { q: "文中提到齊柏林「花了二十多年時間」,這強調了逐夢的哪一種特質?", a: ["毅力", "金錢", "幸運", "天分"], c: 0 },
        { q: "「不摔上幾次,哪能學得成?」這句話體現了什麼學習觀點?", a: ["只要教練好,學生可以完全不摔跤", "失敗是為了證明不適合這項運動", "學習過程中,挫折與失敗是必經的階段", "如果怕受傷,就應該尋找更安全的娛樂"], c: 2 },
        { q: "文中提到「此路不通時,選擇另一個岔口」,這是在建議讀者:", a: ["遇到困難就應該馬上放棄夢想", "夢想是不切實際的", "應該一直堅持原本的路,即使走不通", "在遭遇挫折時可以彈性調整方向"], c: 3 },
        { q: "在《蒂烈娜》中,結尾「閃耀著金光」的披風,最象徵什麼意義?", a: ["留在心中的勇氣與逐夢的決心", "星星們留下來的黃金寶藏", "蒂烈娜成功後獲得的獎品", "那是陽光照射在水面上的倒影而已"], c: 0 },
        { q: "綜合素材,下列哪一個特質是所有主角共同擁有的?", a: ["豐富的山林知識", "過人的體力", "面對挑戰的勇氣與不輕易放棄的精神", "高超的繪畫技巧"], c: 2 },
        { q: "在《達駭黑熊》中,達駭的名字來源為何?", a: ["來自於他拯救的那隻小黑熊", "傳承自英勇的爺爺", "因為他長得黑黑壯壯像黑熊", "是他在獵寮裡自己想出來的"], c: 1 },
        { q: "下列關於夢想的敘述,哪一項最符合素材觀點?", a: ["只要有夢想,人生就會一帆風順", "夢想是遠方的目標,能鼓舞在前行中自在前行", "夢想是專屬於成功人士的特權", "夢想一定要很偉大,否則不值得追求"], c: 1 }
    ];

    const questions30 = [
        { q: "在《風中騎士》中,作者剛開始練習騎單車時的心情如何?", a: ["興奮期待", "充滿自信", "緊張害怕", "毫不在意"], c: 2 },
        { q: "為了防止摔跤受傷,作者練習騎車時做了什麼準備?", a: ["戴上護具", "在草地練習", "教練扶手把", "穿兩件特厚長褲"], c: 3 },
        { q: "表姐學騎車的「矛盾理論」是什麼?", a: ["看前面卻看後面", "踩用力卻慢一點", "車很輕卻說很重", "保證不摔卻說不摔學不成"], c: 3 },
        { q: "作者最後為什麼會撞上五歲的阿雄?", a: ["阿雄衝路中間", "教練忘了教煞車", "看風景分心", "車壞掉"], c: 1 },
        { q: "爺爺「達駭黑熊」的外號由來與什麼有關?", a: ["像故事書的熊", "疤痕與英勇性格", "穿黑衣", "養黑熊"], c: 1 },
        { q: "爺爺教導的「山林智慧」中,不包括下列哪一項?", a: ["認地形地名", "糞便辨識", "辨識毒草", "現代導航"], c: 3 },
        { q: "關於布農族黑熊觀念,下列敘述何者正確?", a: ["骨骸製飾品", "熊肉必備", "獵殺是英雄", "忌諱獵殺黑熊"], c: 3 },
        { q: "作者與爺爺是如何發現受傷的小黑熊的?", a: ["糞便追蹤", "倒下的杉木壓住牠", "山洞求救", "跟蹤黑熊媽"], c: 1 },
        { q: "爺爺稱讚作者是真正「達駭黑熊」的主因?", a: ["學會山林知識", "守護生命的勇氣", "唱熊歌", "第一次打獵抓到熊"], c: 1 },
        { q: "夢想被比喻為什麼?", a: ["遠方的目標", "流星", "財寶箱", "包袱"], c: 0 },
        { q: "齊柏林克服了哪種生理恐懼?", a: ["暈機", "懼高症", "幽閉恐懼", "怕水"], c: 1 },
        { q: "陳彥博亞洲首位紀錄是?", a: ["跑百岳", "奧運金牌", "最快跑者", "完成世界七大洲、八大站極地超馬"], c: 3 },
        { q: "雷納德向喬丹學習了什麼?", a: ["個人品牌", "採訪技巧", "勤奮練習精神", "穿衣風格"], c: 2 },
        { q: "迪士尼為何被廣告公司辭退?", a: ["不畫廣告", "遲到", "嫌棄沒創意", "公司倒閉"], c: 2 },
        { q: "迪士尼對「跌倒」的態度是什麼?", a: ["不適合", "小心謹慎", "換路走", "重新站起來是前行的方式"], c: 3 },
        { q: "《蒂烈娜》場景主要在哪?", a: ["太平洋", "淡水河", "七家灣溪", "日月潭"], c: 2 },
        { q: "蒂烈娜一開始沮喪的原因?", a: ["無法躍過激流", "迷路", "沒食物", "大魚追"], c: 0 },
        { q: "小星星墜落的原因?", a: ["壽命到", "隊長緊急煞車", "想玩", "怪獸推"], c: 1 },
        { q: "蒂烈娜在銀河衝浪學會最重大的事?", a: ["做披風", "星星吃什麼", "認北極星", "困難中堅持努力"], c: 3 },
        { q: "跳上激流的樣子被形容為?", a: ["落葉", "石頭", "箭頭般跳上天", "受驚飛鳥"], c: 2 },
        { q: "金光披風象徵?", a: ["夢境與現實聯繫", "遺忘衣物", "新危險", "汙染"], c: 0 },
        { q: "共同主題最接近?", a: ["聽長輩", "名聲", "堅持追求夢想", "環保"], c: 2 },
        { q: "「有志者事竟成」是誰常說的?", a: ["阿秀", "阿雄", "老師", "表姐"], c: 2 },
        { q: "獵寮煮晚餐主要利用?", a: ["接雨水", "礦泉水", "熊身上的水", "溪水"], c: 0 },
        { q: "爺爺殺死黑熊後一段時間不敢打獵?", a: ["怕警察", "內心懊悔自責", "動物跑光", "受傷重"], c: 1 },
        { q: "「獵寮」被形容為?", a: ["籠子", "市場", "山林裡的家", "倉庫"], c: 2 },
        { q: "「楷模」觀點是?", a: ["幫掌握要領", "隨便選", "阻礙創意", "要達一樣高"], c: 0 },
        { q: "迪士尼第一次接觸「動畫」?", a: ["工作第一天", "被辭退進新公司", "看電影", "美術課"], c: 1 },
        { q: "蒂烈娜隨誰引導?", a: ["月亮", "小星星", "隊長", "老鷹"], c: 1 },
        { q: "「逐夢踏實」建議當?", a: ["參賽者", "膽小鬼", "幸運兒", "拾起風景的旅人"], c: 3 }
    ];

    const wordData = [
        { correct: "長褲", wrong: "長庫" }, { correct: "提供", wrong: "提拱" }, { correct: "黑熊", wrong: "黑能" },
        { correct: "骸骨", wrong: "駭骨" }, { correct: "領域", wrong: "領或" }, { correct: "強勁", wrong: "強經" },
        { correct: "敏捷", wrong: "敏睫" }, { correct: "楷模", wrong: "楷摸" }, { correct: "凶猛", wrong: "凶孟" },
        { correct: "竅門", wrong: "竅們" }
    ];

    function selectLevel(num, strict) {
        selectedTotal = num; isStrictLevel = strict;
        document.getElementById('selected-level-title').innerText = `已選擇：${num} 題${strict ? '(精熟版)' : ''}`;
        document.getElementById('mode-selection').classList.remove('active');
        document.getElementById('level-selection').classList.add('active');
    }

    function initQuiz(audio) {
        isAudioMode = audio;
        if (isAudioMode) document.body.classList.add('audio-mode');
        else document.body.classList.remove('audio-mode');
        currentQ = 0; mcqCorrect = 0; mcqResults = [];
        document.getElementById('level-selection').classList.remove('active');
        document.getElementById('quiz-container').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        let data = questions10;
        if (selectedTotal === 20) data = questions20;
        if (selectedTotal === 30) data = questions30;
        
        if (currentQ >= data.length) { showMCQSummary(); return; }
        
        const q = data[currentQ];
        document.getElementById('strict-hint').style.display = 'none';
        document.getElementById('q-box').innerHTML = `<button class="read-btn" onclick="speak('${q.q}')">🔊</button><span>${currentQ + 1}. ${q.q}</span>`;
        const opts = document.getElementById('q-options'); opts.innerHTML = '';
        
        q.a.forEach((opt, idx) => {
            const btn = document.createElement('button'); btn.className = 'answer-btn';
            btn.innerHTML = `<button class="read-btn" onclick="event.stopPropagation(); speak('${opt}')">🔊</button><span>${String.fromCharCode(65 + idx)}. ${opt}</span>`;
            btn.onclick = () => {
                const right = (idx === q.c);
                if (isStrictLevel) {
                    if (right) {
                        btn.classList.add('correct');
                        setTimeout(() => { currentQ++; showQuestion(); }, 500);
                    } else {
                        btn.classList.add('wrong');
                        document.getElementById('strict-hint').style.display = 'block';
                    }
                } else {
                    if (right) mcqCorrect++;
                    mcqResults.push({ q: q.q, isRight: right, correctAns: q.a[q.c] });
                    currentQ++; showQuestion();
                }
            };
            opts.appendChild(btn);
        });
        document.getElementById('progress-fill').style.width = `${(currentQ / data.length) * 100}%`;
    }

    function showMCQSummary() {
        document.getElementById('quiz-container').classList.remove('active');
        document.getElementById('mcq-summary').classList.add('active');
        const list = document.getElementById('mcq-error-list'); list.innerHTML = '';
        
        if (isStrictLevel) {
            document.getElementById('summary-title').innerText = "精熟練習達成！✅";
            document.getElementById('mcq-correct-count').parentElement.style.display = 'none';
            list.innerHTML = '<div style="text-align:center; font-size:1.2rem;">你已經正確回答了所有進階問題！</div>';
        } else {
            document.getElementById('summary-title').innerText = "測驗回顧 ✨";
            document.getElementById('mcq-correct-count').parentElement.style.display = 'block';
            document.getElementById('mcq-correct-count').innerText = mcqCorrect;
            document.getElementById('mcq-total-count').innerText = selectedTotal;
            const errors = mcqResults.filter(r => !r.isRight);
            if (errors.length === 0) list.innerHTML = '<div style="color:green; text-align:center; font-size:1.2rem;">全部答對！太優秀了！🌟</div>';
            else errors.forEach(r => {
                const div = document.createElement('div'); div.className = 'error-item';
                div.innerHTML = `<b>題目：</b>${r.q}<br><span style="color:green"><b>正確答案：</b>${r.correctAns}</span>`;
                list.appendChild(div);
            });
        }
    }

    function startWordTest() {
        currentW = 0; wordCorrect = 0;
        document.getElementById('mcq-summary').classList.remove('active');
        document.getElementById('word-container').classList.add('active');
        showWordPair();
    }

    function showWordPair() {
        if (currentW >= wordData.length) { showFinalResult(); return; }
        const p = wordData[currentW];
        document.getElementById('word-audio-box').innerHTML = `<button class="read-btn" style="width:70px; height:70px; font-size:2rem; display:inline-flex;" onclick="speak('${p.correct}')">🔊 點我讀音</button>`;
        const container = document.getElementById('word-pair-container'); container.innerHTML = '';
        const isLeft = Math.random() > 0.5;
        const w1 = isLeft ? p.correct : p.wrong; const w2 = isLeft ? p.wrong : p.correct;
        [w1, w2].forEach(w => {
            const btn = document.createElement('button'); btn.className = 'word-btn-big'; btn.innerText = w;
            btn.onclick = function() {
                if (container.classList.contains('done')) return;
                if (w === p.correct) { this.classList.add('correct'); wordCorrect++; } else { this.classList.add('wrong'); }
                container.classList.add('done');
                setTimeout(() => { container.classList.remove('done'); currentW++; showWordPair(); }, 800);
            };
            container.appendChild(btn);
        });
        document.getElementById('word-progress-fill').style.width = `${(currentW / wordData.length) * 100}%`;
    }

    function showFinalResult() {
        document.getElementById('word-container').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        let totalVal = isStrictLevel ? "精熟完成" : (mcqCorrect + wordCorrect);
        document.getElementById('final-total-score').innerText = totalVal;
    }

    function goToLobby() {
        const panels = ['quiz-container', 'word-container', 'result-screen', 'mcq-summary', 'level-selection'];
        panels.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('mode-selection').classList.add('active');
    }

    function updateCountdown() {
        const grad = new Date("2026/06/15 00:00:00").getTime();
        const diff = grad - new Date().getTime();
        if (diff <= 0) { document.getElementById("timer").innerText = "畢業快樂！🎓"; return; }
        const d = Math.floor(diff / 86400000); const h = Math.floor((diff % 86400000) / 3600000);
        document.getElementById("timer").innerText = `${d} 天 ${h} 小時`;
    }
    setInterval(updateCountdown, 60000); updateCountdown();
    new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 140, height: 140 });
    function toggleQR() { const m = document.getElementById('qr-modal'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    function speak(t) { if (!isAudioMode) return; window.speechSynthesis.cancel(); const m = new SynthesisUtterance(t); m.lang = 'zh-TW'; m.rate = 0.9; window.speechSynthesis.speak(m); }
</script>
</body>
